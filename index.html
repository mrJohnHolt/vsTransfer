<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vsTransfer Training | Click Lancashire</title>
<meta name="description" content="Learn how to securely share large files with vsTransfer in five short modules.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/print.css" media="print">
</head>
<body>

<a class="skip-link" href="#main-content">Skip to module content</a>

<header class="app-header">
  <div class="app-header__brand">
    <span class="app-header__mark" aria-hidden="true"><i class="fa-solid fa-shield-halved"></i></span>
    <span class="app-header__title">vsTransfer Training</span>
  </div>
  <button class="app-header__burger" id="burger-toggle" aria-expanded="false" aria-controls="sidebar" aria-label="Open module menu">
    <i class="fa-solid fa-bars" aria-hidden="true"></i>
  </button>
</header>

<div class="app-shell">

  <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

  <nav class="sidebar" id="sidebar" aria-label="Module navigation">
    <div class="sidebar__progress">
      <div class="sidebar__progress-label">
        <span id="progress-text">0 of 5 complete</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Course progress">
        <div class="progress-bar__fill" id="progress-fill"></div>
      </div>
    </div>

    <ol class="module-list" id="module-list"></ol>

    <button class="sidebar__reset" id="reset-button" type="button">
      <i class="fa-solid fa-rotate-left" aria-hidden="true"></i> Reset progress
    </button>
  </nav>

  <main class="main-content" id="main-content">

    <nav class="breadcrumb" aria-label="Breadcrumb">
      <ol id="breadcrumb-list"></ol>
    </nav>

    <article class="module" id="module-panel" aria-live="polite">
    </article>

  </main>

</div>

<nav class="bottom-nav" aria-label="Module pagination">
  <button class="bottom-nav__button bottom-nav__button--prev" id="prev-button" type="button">
    <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
    <span>Previous</span>
  </button>
  <span class="bottom-nav__status" id="bottom-nav-status">Module 1 of 5</span>
  <button class="bottom-nav__button bottom-nav__button--next" id="next-button" type="button">
    <span>Next</span>
    <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
  </button>
</nav>

<div class="toast" id="toast" role="alert" aria-live="assertive" hidden></div>

<script src="js/main.js"></script>
</body>
</html>
